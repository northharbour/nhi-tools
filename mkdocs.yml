site_name: NHI Documentation
site_url: https://app.northharbourinstruments.com/docs/
site_description: Product documentation for North Harbour Instruments
site_author: North Harbour Instruments

# Build output goes to docs_build/ (GitHub Action deploys this to /docs/)
site_dir: docs_build

# Source markdown lives in docs_src/
docs_dir: docs_src

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    logo: material/book-open-variant
  logo: assets/logo_small.png
  favicon: assets/logo_small.png

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Products:
    - Overview: products/index.md
  - Geiger Counter App:
    - Setup Guide: geiger-app/setup.md
  - Support:
    - Contact: support/contact.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/northharbour
  generator: false

copyright: "&copy; North Harbour Instruments"
