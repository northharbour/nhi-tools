<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHI Tools - North Harbour Instruments</title>
    <meta name="description" content="Online tools and documentation from North Harbour Instruments">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #46493C;
            color: #F6EDDD;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.8rem;
            color: #FFA300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 0.75rem;
            color: #b8b0a0;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
        }
        .tool-card {
            background: #3a3d32;
            border: 1px solid #5a5d4e;
            border-radius: 2px;
            padding: 1.5rem;
            text-decoration: none;
            color: #F6EDDD;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .tool-card:hover {
            border-color: #FFA300;
            box-shadow: 0 0 15px rgba(255, 163, 0, 0.2);
        }
        .tool-card h2 {
            font-size: 1rem;
            color: #FFA300;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .tool-card p {
            font-family: system-ui, sans-serif;
            font-size: 0.85rem;
            color: #b8b0a0;
            line-height: 1.5;
        }
        .tag {
            display: inline-block;
            font-size: 0.6rem;
            color: #FFA300;
            border: 1px solid #5a5d4e;
            padding: 0.2rem 0.5rem;
            margin-top: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        footer {
            margin-top: auto;
            padding-top: 3rem;
            font-size: 0.6rem;
            color: #5a5d4e;
            letter-spacing: 1px;
        }
        footer a { color: #b8b0a0; text-decoration: none; }
        footer a:hover { color: #FFA300; }
    </style>
</head>
<body>
    <h1>☢️ NHI Tools</h1>
    <p class="subtitle">North Harbour Instruments</p>

    <div class="tools-grid">
        <a href="geiger/" class="tool-card">
            <h2>Geiger Counter PWA</h2>
            <p>Audio-based pulse counter for Geiger-Müller detectors. Counts 4kHz beeps and displays CPS/CPM readings. Works offline, installable on iOS & Android.</p>
            <span class="tag">PWA · Offline</span>
        </a>

        <!-- Add more tools/docs cards here -->
        <!--
        <a href="docs/" class="tool-card">
            <h2>Documentation</h2>
            <p>Product manuals, specifications, and setup guides for NHI instruments.</p>
            <span class="tag">Docs</span>
        </a>
        -->
    </div>

    <footer>
        <a href="https://northharbourinstruments.com">northharbourinstruments.com</a>
    </footer>
</body>
</html>
